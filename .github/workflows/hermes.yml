name: Hermes Gateway

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

concurrency:
  group: hermes-agent
  cancel-in-progress: true

jobs:
  hermes:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip curl
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install

      - name: Restore Hermes state from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
           mkdir -p ~/.hermes

           if [ -f hermes.zip ]; then
           unzip -o hermes.zip -d /tmp/hermes_restore

            # Move only the .hermes content safely
            if [ -d /tmp/hermes_restore/home/runner/.hermes ]; then
              cp -r /tmp/hermes_restore/home/runner/.hermes/* ~/.hermes/
            elif [ -d /tmp/hermes_restore/.hermes ]; then
            cp -r /tmp/hermes_restore/.hermes/* ~/.hermes/
           else
             echo "Unexpected zip structure"
               fi

              echo "State restored"
              else
             echo "No previous state found"
              fi

      - name: Install Hermes
        run: |
          echo "y" | bash -c "$(curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh)"
          echo 'export PATH="$HOME/.local/bin:$PATH"' >> ~/.bashrc

      - name: Write credentials and config
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_USERS: ${{ secrets.TELEGRAM_ALLOWED_USERS }}
          TELEGRAM_HOME_CHANNEL: ${{ secrets.TELEGRAM_HOME_CHANNEL }}
        run: |
          mkdir -p ~/.hermes

          # Always rewrite .env (safer than storing in R2)
          cat > ~/.hermes/.env << EOF
          NVIDIA_API_KEY=${NVIDIA_API_KEY}
          GOOGLE_API_KEY=${GOOGLE_API_KEY}
          TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
          TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
          TELEGRAM_HOME_CHANNEL=${TELEGRAM_HOME_CHANNEL}
          EOF

          # Config (same as yours)
          cat > ~/.hermes/config.yaml << 'EOF'
          model:
            default: nvidia/nemotron-3-super-120b-a12b
            provider: nvidia
            base_url: https://integrate.api.nvidia.com/v1

          agent:
            max_turns: 90
            yolo: true
            tool_use_enforcement: auto
            reasoning_effort: medium
            image_input_mode: auto

          auxiliary:
            vision:
              provider: gemini
              model: gemini-2.0-flash

          platform_toolsets:
            cli:
              - hermes-cli
            telegram:
              - hermes-telegram

          browser:
            camofox:
              managed_persistence: true

          telegram:
            reply_to_unknown: false
            reactions: false

          memory:
            memory_enabled: true
            user_profile_enabled: true

          session_reset:
            mode: both
            idle_minutes: 1440
            at_hour: 4

          compression:
            enabled: true
            threshold: 0.5

          security:
            tirith_enabled: false

          display:
            tool_progress: all
          EOF

      - name: Start Hermes Gateway
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_USERS: ${{ secrets.TELEGRAM_ALLOWED_USERS }}
          TELEGRAM_HOME_CHANNEL: ${{ secrets.TELEGRAM_HOME_CHANNEL }}
        run: |
          source ~/.bashrc
          export PATH="$HOME/.local/bin:$PATH"
          hermes gateway

      - name: Save Hermes state to R2
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          echo "Zipping Hermes state..."
          zip -r -9 hermes.zip ~/.hermes

          echo "Uploading to R2..."
          aws --endpoint-url ${{ secrets.R2_ENDPOINT }} \
            s3 cp hermes.zip s3://${{ secrets.R2_BUCKET }}/agents/hermes.zip

          echo "State saved"