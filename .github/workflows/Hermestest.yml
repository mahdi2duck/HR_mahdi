name: Hermes 10-Min Persistence Test

on:
  schedule:
    - cron: '*/10 * * * *' 
  workflow_dispatch:

concurrency:
  group: hermes-test
  cancel-in-progress: true

jobs:
  hermes:
    runs-on: ubuntu-latest
    timeout-minutes: 11 

    steps:
      - name: Restore Hermes data
        uses: actions/cache/restore@v4
        with:
          path: ~/.hermes
          key: hermes-data-${{ github.run_id }}
          restore-keys: |
            hermes-data-

      - name: Install Hermes
        run: |
          if [ ! -f ~/.local/bin/hermes ]; then
            echo "y" | bash -c "$(curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh)"
          fi
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Write Credentials and Config
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_USERS: ${{ secrets.TELEGRAM_ALLOWED_USERS }}
          TELEGRAM_HOME_CHANNEL: ${{ secrets.TELEGRAM_HOME_CHANNEL }}
        run: |
          mkdir -p ~/.hermes
          
          # Create .env with the necessary allowlist
          cat > ~/.hermes/.env << EOF
          NVIDIA_API_KEY=${NVIDIA_API_KEY}
          GOOGLE_API_KEY=${GOOGLE_API_KEY}
          TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
          TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
          TELEGRAM_HOME_CHANNEL=${TELEGRAM_HOME_CHANNEL}
          # This allows the bot to actually respond to you
          GATEWAY_ALLOW_ALL_USERS=false 
          EOF

          # Simplified config that correctly enables the Telegram platform
          cat > ~/.hermes/config.yaml << 'EOF'
          model:
            default: nvidia/nemotron-3-super-120b-a12b
            provider: nvidia
          
          # This block is required to fix the "No messaging platforms enabled" error
          platforms:
            telegram:
              enabled: true

          agent:
            max_turns: 90
            yolo: true

          memory:
            memory_enabled: true
          EOF

      - name: Start Hermes Gateway
        run: hermes gateway

      - name: Save Hermes data
        if: always() 
        uses: actions/cache/save@v4
        with:
          path: ~/.hermes
          key: hermes-data-${{ github.run_id }}
