name: Hermes 10-Min Persistence Test

on:
  workflow_dispatch:

concurrency:
  group: hermes-test
  cancel-in-progress: true

jobs:
  hermes:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Restore Hermes data
        uses: actions/cache/restore@v4
        with:
          path: ~/.hermes
          # Using run_id ensures we always save a fresh version
          key: hermes-data-${{ github.run_id }}
          restore-keys: |
            hermes-data-

      - name: Install Hermes
        run: |
          # 1. FIX: Clean up the cached repo to avoid 'stash reference' errors
          if [ -d "$HOME/.hermes/hermes-agent" ]; then
            echo "Cleaning cached repository..."
            cd "$HOME/.hermes/hermes-agent"
            git reset --hard HEAD
            git clean -fd
            # Wipe any stale stashes that crash the installer
            git stash clear || true 
            cd $GITHUB_WORKSPACE
          fi

          # 2. Run the official installer
          echo "y" | bash -c "$(curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh)"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Write Credentials and Config
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_USERS: ${{ secrets.TELEGRAM_ALLOWED_USERS }}
          TELEGRAM_HOME_CHANNEL: ${{ secrets.TELEGRAM_HOME_CHANNEL }}
        run: |
          mkdir -p ~/.hermes
          
          # Force create .env with the correct variables
          cat > ~/.hermes/.env << EOF
          NVIDIA_API_KEY=${NVIDIA_API_KEY}
          GOOGLE_API_KEY=${GOOGLE_API_KEY}
          TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
          TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
          TELEGRAM_HOME_CHANNEL=${TELEGRAM_HOME_CHANNEL}
          EOF

          # Enable Telegram platform explicitly in config
          cat > ~/.hermes/config.yaml << 'EOF'
          model:
            default: nvidia/nemotron-3-super-120b-a12b
            provider: nvidia
          
          platforms:
            telegram:
              enabled: true

          agent:
            max_turns: 90
            yolo: true

          memory:
            memory_enabled: true
          EOF

      - name: Start Hermes Gateway
        run: |
          source ~/.bashrc || true
          export PATH="$HOME/.local/bin:$PATH"
          hermes gateway

      - name: Save Hermes data
        if: always() 
        uses: actions/cache/save@v4
        with:
          path: ~/.hermes
          key: hermes-data-${{ github.run_id }}
