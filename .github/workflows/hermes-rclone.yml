name: Hermes MCP + rclone

on:
  workflow_dispatch:

concurrency:
  group: hermes-production
  cancel-in-progress: true


jobs:
  hermes:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Configure Rclone
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          # Install rclone
          curl -fsSL https://rclone.org/install.sh | sudo bash

          # Write rclone config
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_ACCESS_KEY_ID}
          secret_access_key = ${R2_SECRET_ACCESS_KEY}
          endpoint = https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
          acl = private
          EOF

      - name: Fix DNS (Cloudflare)
        run: |
          echo "Fixing DNS..."
          sudo tee /etc/resolv.conf > /dev/null << EOF
          nameserver 1.1.1.1
          EOF
          cat /etc/resolv.conf
          # Add a test to verify connectivity
          ping -c 1 1.1.1.1 || echo "DNS test failed"
          nslookup r2.cloudflarestorage.com || echo "DNS lookup failed"

      - name: Restore State from R2
        run: |
          echo "Pulling latest state archives from R2..."

          # Download the archives to /tmp
          rclone copy r2:hermes-state/hermes-state.tar.gz /tmp/ || echo "No Hermes backup found."
          rclone copy r2:hermes-state/camofox-state.tar.gz /tmp/ || echo "No Camoufox backup found."

          # Create directories
          mkdir -p ~/.hermes
          mkdir -p ~/.camofox

          # Extract if they exist
          if [ -f /tmp/hermes-state.tar.gz ]; then
            tar -xzf /tmp/hermes-state.tar.gz -C ~/.hermes
            echo "Hermes state restored."
          fi

          if [ -f /tmp/camofox-state.tar.gz ]; then
            tar -xzf /tmp/camofox-state.tar.gz -C ~/.camofox
            echo "Camoufox state restored."
          fi

      - name: Restore Camoufox Cache from R2
        run: |
          echo "Pulling Camoufox cache from R2..."
          rclone sync r2:hermes-state/camofox ~/.camofox \
            --create-empty-src-dirs \
            --transfers=8 \
            --log-level INFO
          echo "Camoufox cache restore complete."

      - name: Install and Start Camoufox (Background)
        run: |
          # 1. Clone the stealth browser repo
          git clone https://github.com/jo-inc/camofox-browser
          cd camofox-browser

          # 2. Install dependencies
          npm install

          # 3. Start the server in the background
          export CAMOFOX_PORT=9377
          nohup npm start > camofox.log 2>&1 &

          # 4. Wait for the browser to download and the health check to pass
          echo "Waiting for Camoufox to download and start (up to 5 minutes)..."
          TIMEOUT=300
          until curl -s http://localhost:9377/health; do
            if [ $TIMEOUT -le 0 ]; then
              echo "ERROR: Camoufox failed to start within 5 minutes."
              cat camofox.log
              exit 1
            fi
            sleep 10
            TIMEOUT=$((TIMEOUT-10))
            echo "Still waiting... ($TIMEOUT seconds remaining)"
          done
          echo "Camoufox is ONLINE at http://localhost:9377"

      - name: Install Hermes
        run: |
          # Clean up any broken repo state from cache to prevent git errors
          if [ -d "$HOME/.hermes/hermes-agent" ]; then
            cd "$HOME/.hermes/hermes-agent"
            git reset --hard HEAD && git clean -fd
            cd $GITHUB_WORKSPACE
          fi

          # Run official installer
          echo "y" | bash -c "$(curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh)"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configure Hermes
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_USERS: ${{ secrets.TELEGRAM_ALLOWED_USERS }}
          TELEGRAM_HOME_CHANNEL: ${{ secrets.TELEGRAM_HOME_CHANNEL }}
          BRIGHTDATA_API_TOKEN: ${{ secrets.BRIGHTDATA_API_TOKEN }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
        run: |
          mkdir -p ~/.hermes

          # .env and config.yaml are always regenerated fresh from GitHub Secrets
          # They are excluded from R2 sync — secrets never leave the runner
          cat > ~/.hermes/.env << EOF
          NVIDIA_API_KEY=${NVIDIA_API_KEY}
          GOOGLE_API_KEY=${GOOGLE_API_KEY}
          TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
          TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
          TELEGRAM_HOME_CHANNEL=${TELEGRAM_HOME_CHANNEL}
          CAMOFOX_URL=http://localhost:9377
          EOF

          cat > ~/.hermes/config.yaml << EOF
          model:
            default: nvidia/nemotron-3-super-120b-a12b
            provider: nvidia
          platforms:
            telegram:
              enabled: true
          mcp_servers:
            brightdata:
              command: "npx"
              args: ["-y", "@brightdata/mcp"]
              env:
                API_TOKEN: "${BRIGHTDATA_API_TOKEN}"
          browser:
            camofox:
              managed_persistence: true
          agent:
            max_turns: 90
            yolo: true
          EOF

      - name: Start Tarball Backup Watcher (Background)
        run: |
          # Exclude files that are always regenerated from GitHub Secrets
          cat > /tmp/tar-exclude.txt << EOF
          .env
          config.yaml
          EOF

          while true; do
            sleep 5m
            echo "Packaging Hermes and Camoufox state..."
            
            # Compress hermes state (prevent crash if files change during read)
            tar -czf /tmp/hermes-state.tar.gz -X /tmp/tar-exclude.txt -C ~/.hermes . || echo "Hermes files modified, ignoring tar warning."
            
            # Compress camoufox cache (prevent crash if files change during read)
            tar -czf /tmp/camofox-state.tar.gz -C ~/.camofox . || echo "Camoufox files modified, ignoring tar warning."

            # Copy the two single files to R2 (Overwrites the old ones)
            rclone copy /tmp/hermes-state.tar.gz r2:hermes-state/ \
              --transfers=2 \
              --log-level ERROR
            rclone copy /tmp/camofox-state.tar.gz r2:hermes-state/ \
              --transfers=2 \
              --log-level ERROR
          done &
          echo "Tarball watcher started (PID: $!), uploading 2 files every 60s"

      - name: Run Hermes Gateway
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          hermes gateway

      - name: Final Tarball Backup to R2 on Exit
        if: always()
        run: |
          echo "Running final state backup to R2..."
          
          # Re-create the exclude list just in case the job failed before it was generated
          cat > /tmp/tar-exclude.txt << EOF
          .env
          config.yaml
          EOF

          # Compress and upload Hermes state (if it exists)
          if [ -d "$HOME/.hermes" ]; then
            echo "Packaging Hermes state..."
            # The '|| echo' prevents the job from crashing if files change while zipping
            tar -czf /tmp/hermes-state.tar.gz -X /tmp/tar-exclude.txt -C ~/.hermes . || echo "Warning: Hermes files modified during backup. Proceeding."
            rclone copy /tmp/hermes-state.tar.gz r2:hermes-state/ \
              --transfers=2 \
              --log-level INFO
            echo "Hermes final backup uploaded."
          else
            echo "Hermes directory not found, skipping final backup."
          fi

          # Compress and upload Camoufox cache (if it exists)
          if [ -d "$HOME/.camofox" ]; then
            echo "Packaging Camoufox state..."
            # The '|| echo' prevents the job from crashing if files change while zipping
            tar -czf /tmp/camofox-state.tar.gz -C ~/.camofox . || echo "Warning: Camoufox files modified during backup. Proceeding."
            rclone copy /tmp/camofox-state.tar.gz r2:hermes-state/ \
              --transfers=2 \
              --log-level INFO
            echo "Camoufox final backup uploaded."
          else
            echo "Camoufox directory not found, skipping final backup."
          fi
          
          echo "Final backup sequence complete."
        if: always()
        run: |
          echo "Running final state backup to R2..."
          
          # Re-create the exclude list just in case the job failed before it was generated
          cat > /tmp/tar-exclude.txt << EOF
          .env
          config.yaml
          EOF

          # Compress and upload Hermes state (if it exists)
          if [ -d "$HOME/.hermes" ]; then
            echo "Packaging Hermes state..."
            tar -czf /tmp/hermes-state.tar.gz -X /tmp/tar-exclude.txt -C ~/.hermes .
            rclone copy /tmp/hermes-state.tar.gz r2:hermes-state/ \
              --transfers=2 \
              --log-level INFO
            echo "Hermes final backup uploaded."
          else
            echo "Hermes directory not found, skipping final backup."
          fi

          # Compress and upload Camoufox cache (if it exists)
          if [ -d "$HOME/.camofox" ]; then
            echo "Packaging Camoufox state..."
            tar -czf /tmp/camofox-state.tar.gz -C ~/.camofox .
            rclone copy /tmp/camofox-state.tar.gz r2:hermes-state/ \
              --transfers=2 \
              --log-level INFO
            echo "Camoufox final backup uploaded."
          else
            echo "Camoufox directory not found, skipping final backup."
          fi
          
          echo "Final backup sequence complete."